# Test Configuration - Use H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration for tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=false

# Disable Eureka for tests
eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# Disable Kafka for tests
spring.kafka.bootstrap-servers=
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration,org.springframework.boot.autoconfigure.data.mongodb.MongoDataAutoConfiguration,org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration

# Disable MongoDB for tests
spring.data.mongodb.uri=

# Disable Mail for tests
spring.mail.host=
spring.mail.port=587
spring.mail.username=
spring.mail.password=

# JWT Configuration for tests (use test keys)
security.jwt.token.secret-key=test-secret-key-for-testing-only-not-for-production-use
security.jwt.token.refresh-secret-key=test-refresh-secret-key-for-testing-only-not-for-production-use
security.jwt.token.expiration=3600000
security.jwt.token.refresh-expiration=604800000

# OTP Configuration for tests
app.otp.length=6
app.otp.expiration-minutes=10

# Mail Configuration for tests
app.mail.from=test@diagnocare.com

# Security configuration for tests
spring.security.user.name=test
spring.security.user.password=test
